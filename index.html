<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Электронная подпись</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--tg-theme-bg-color);
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            padding: 20px;
            min-height: 100vh;
        }
        .container { max-width: 500px; margin: 0 auto; }
        .title { text-align: center; margin-bottom: 20px; color: var(--tg-theme-text-color); }
        .canvas-wrapper {
            background: white;
            border-radius: 16px;
            padding: 10px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        canvas {
            display: block;
            width: 100%;
            height: auto;
            background: white;
            border-radius: 8px;
            cursor: crosshair;
            border: 1px solid #ccc;
        }
        .buttons { display: flex; gap: 12px; margin-bottom: 20px; }
        button {
            flex: 1;
            background: var(--tg-theme-button-color);
            color: var(--tg-theme-button-text-color);
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
        }
        .clear-btn { background: var(--tg-theme-secondary-bg-color); color: var(--tg-theme-text-color); }
        .info { text-align: center; color: var(--tg-theme-hint-color); font-size: 13px; margin-top: 20px; }
        .status { text-align: center; font-size: 14px; padding: 10px; margin-top: 10px; border-radius: 8px; }
        .success { background: rgba(0,200,0,0.2); color: #00cc00; }
        .error { background: rgba(200,0,0,0.2); color: #ff4444; }
    </style>
</head>
<body>
    <div class="container">
        <h3 class="title">✍️ Электронная подпись</h3>
        
        <div class="canvas-wrapper">
            <canvas id="signatureCanvas" width="400" height="200"></canvas>
        </div>
        
        <div class="buttons">
            <button class="clear-btn" onclick="clearCanvas()">🗑 Очистить</button>
            <button onclick="saveSignature()">✅ Сохранить подпись</button>
        </div>
        
        <div class="info">
            Нарисуйте подпись черным цветом
        </div>
        
        <div id="status" class="status"></div>
    </div>

    <script>
        const canvas = document.getElementById('signatureCanvas');
        const ctx = canvas.getContext('2d');
        let drawing = false;
        
        // Белый фон
        ctx.fillStyle = 'white';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        // Настройки рисования
        ctx.lineWidth = 2.5;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.strokeStyle = '#000000';
        
        function getCoordinates(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            
            let clientX, clientY;
            if (e.touches) {
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
                e.preventDefault();
            } else {
                clientX = e.clientX;
                clientY = e.clientY;
            }
            
            let x = (clientX - rect.left) * scaleX;
            let y = (clientY - rect.top) * scaleY;
            x = Math.max(0, Math.min(x, canvas.width));
            y = Math.max(0, Math.min(y, canvas.height));
            return { x, y };
        }
        
        function startDrawing(e) {
            drawing = true;
            const pos = getCoordinates(e);
            ctx.beginPath();
            ctx.moveTo(pos.x, pos.y);
            ctx.lineTo(pos.x, pos.y);
            ctx.stroke();
            e.preventDefault();
        }
        
        function draw(e) {
            if (!drawing) return;
            e.preventDefault();
            const pos = getCoordinates(e);
            ctx.lineTo(pos.x, pos.y);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(pos.x, pos.y);
        }
        
        function stopDrawing(e) {
            drawing = false;
            ctx.beginPath();
            if (e) e.preventDefault();
        }
        
        function clearCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = 'white';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.beginPath();
            showStatus('Очищено', 'success');
        }
        
        function showStatus(msg, type) {
            const div = document.getElementById('status');
            div.textContent = msg;
            div.className = `status ${type}`;
            setTimeout(() => {
                if (div.textContent === msg) div.textContent = '';
            }, 2000);
        }
        
        function isCanvasEmpty() {
            const pixels = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
            for (let i = 3; i < pixels.length; i += 4) {
                if (pixels[i] > 0) return false;
            }
            return true;
        }
        
        function saveSignature() {
            if (isCanvasEmpty()) {
                showStatus('⚠️ Нарисуйте подпись!', 'error');
                return;
            }
            
            showStatus('📤 Отправка...', 'success');
            
            // Уменьшаем размер для отправки
            const tempCanvas = document.createElement('canvas');
            const tempCtx = tempCanvas.getContext('2d');
            tempCanvas.width = 300;
            tempCanvas.height = 120;
            tempCtx.fillStyle = 'white';
            tempCtx.fillRect(0, 0, tempCanvas.width, tempCanvas.height);
            tempCtx.drawImage(canvas, 0, 0, tempCanvas.width, tempCanvas.height);
            
            const imageData = tempCanvas.toDataURL('image/jpeg', 0.8);
            
            // Отправляем данные боту
            Telegram.WebApp.sendData(imageData);
            showStatus('✅ Отправлено!', 'success');
            
            // Закрываем Web App через 1 секунду
            setTimeout(function() {
                Telegram.WebApp.close();
            }, 1000);
        }
        
        canvas.addEventListener('mousedown', startDrawing);
        canvas.addEventListener('mousemove', draw);
        canvas.addEventListener('mouseup', stopDrawing);
        canvas.addEventListener('mouseleave', stopDrawing);
        canvas.addEventListener('touchstart', startDrawing);
        canvas.addEventListener('touchmove', draw);
        canvas.addEventListener('touchend', stopDrawing);
        
        Telegram.WebApp.ready();
        Telegram.WebApp.expand();
        
        console.log('Web App готов');
    </script>
</body>
</html>
