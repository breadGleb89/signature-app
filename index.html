<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Signature</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: system-ui; padding: 20px; text-align: center; }
        canvas { border: 1px solid #ccc; cursor: crosshair; background: white; margin: 20px 0; }
        button { margin: 5px; padding: 12px 24px; border-radius: 12px; border: none; background: #0088cc; color: white; cursor: pointer; }
        .clear { background: #999; }
        .status { margin-top: 20px; color: #666; }
    </style>
</head>
<body>
    <h3>Electronic Signature</h3>
    <canvas id="sigCanvas" width="350" height="150"></canvas><br>
    <button class="clear" onclick="clearCanvas()">Clear</button>
    <button onclick="sendSignature()">Save Signature</button>
    <div id="status" class="status"></div>

    <script>
        const canvas = document.getElementById('sigCanvas');
        const ctx = canvas.getContext('2d');
        let drawing = false;
        
        // Initialize canvas
        function initCanvas() {
            ctx.fillStyle = 'white';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = 'black';
            ctx.lineWidth = 2;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
        }
        
        initCanvas();
        
        function getCoords(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            let x, y;
            if (e.touches) {
                x = (e.touches[0].clientX - rect.left) * scaleX;
                y = (e.touches[0].clientY - rect.top) * scaleY;
                e.preventDefault();
            } else {
                x = (e.clientX - rect.left) * scaleX;
                y = (e.clientY - rect.top) * scaleY;
            }
            return { x: Math.min(Math.max(0, x), canvas.width), 
                     y: Math.min(Math.max(0, y), canvas.height) };
        }
        
        function start(e) { 
            drawing = true; 
            const p = getCoords(e);
            ctx.beginPath();
            ctx.moveTo(p.x, p.y);
            ctx.lineTo(p.x, p.y);
            ctx.stroke();
            e.preventDefault();
        }
        
        function draw(e) { 
            if (!drawing) return; 
            e.preventDefault(); 
            const p = getCoords(e);
            ctx.lineTo(p.x, p.y);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(p.x, p.y);
        }
        
        function stop(e) { 
            drawing = false; 
            ctx.beginPath();
            e.preventDefault(); 
        }
        
        function clearCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = 'white';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            document.getElementById('status').innerHTML = 'Canvas cleared';
            setTimeout(() => { document.getElementById('status').innerHTML = ''; }, 1000);
        }
        
        function isCanvasEmpty() {
            const pixels = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
            for (let i = 3; i < pixels.length; i += 4) {
                if (pixels[i] > 0) return false;
            }
            return true;
        }
        
        function sendSignature() {
            if (isCanvasEmpty()) {
                document.getElementById('status').innerHTML = 'Draw a signature first!';
                setTimeout(() => { document.getElementById('status').innerHTML = ''; }, 2000);
                return;
            }
            
            document.getElementById('status').innerHTML = 'Sending...';
            
            // Create a fresh canvas with the current signature
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = 300;
            tempCanvas.height = 120;
            const tempCtx = tempCanvas.getContext('2d');
            tempCtx.fillStyle = 'white';
            tempCtx.fillRect(0, 0, tempCanvas.width, tempCanvas.height);
            tempCtx.drawImage(canvas, 0, 0, tempCanvas.width, tempCanvas.height);
            
            const dataUrl = tempCanvas.toDataURL('image/jpeg', 0.8);
            console.log('Sending signature, size:', dataUrl.length);
            Telegram.WebApp.sendData(dataUrl);
            
            setTimeout(() => {
                Telegram.WebApp.close();
            }, 500);
        }
        
        canvas.addEventListener('mousedown', start);
        canvas.addEventListener('mousemove', draw);
        canvas.addEventListener('mouseup', stop);
        canvas.addEventListener('mouseleave', stop);
        canvas.addEventListener('touchstart', start);
        canvas.addEventListener('touchmove', draw);
        canvas.addEventListener('touchend', stop);
        
        Telegram.WebApp.ready();
        Telegram.WebApp.expand();
    </script>
</body>
</html>
