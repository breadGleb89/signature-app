<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <button onclick="send()">Отправить</button>
    <script>
        function send() {
            Telegram.WebApp.sendData("test");
            Telegram.WebApp.close();
        }
        Telegram.WebApp.ready();
    </script>
</body>
</html>
