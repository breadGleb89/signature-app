<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Подпись</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: system-ui;
            padding: 20px;
            text-align: center;
        }
        canvas {
            border: 2px solid #000;
            border-radius: 8px;
            cursor: crosshair;
            margin: 20px 0;
            background: white;
        }
        button {
            background: #0088cc;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            margin: 5px;
        }
        .clear {
            background: #999;
        }
        .status {
            margin-top: 20px;
            padding: 10px;
            border-radius: 8px;
        }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
    <h3>✍️ Нарисуйте подпись</h3>
    <canvas id="canvas" width="400" height="200"></canvas>
    <div>
        <button class="clear" onclick="clearCanvas()">Очистить</button>
        <button onclick="saveSignature()">Сохранить</button>
    </div>
    <div id="status"></div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let drawing = false;
        
        ctx.lineWidth = 2;
        ctx.lineCap = 'round';
        ctx.strokeStyle = '#000';
        
        function getCoordinates(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            
            let x, y;
            if (e.touches) {
                x = (e.touches[0].clientX - rect.left) * scaleX;
                y = (e.touches[0].clientY - rect.top) * scaleY;
                e.preventDefault();
            } else {
                x = (e.clientX - rect.left) * scaleX;
                y = (e.clientY - rect.top) * scaleY;
            }
            return { x: Math.max(0, Math.min(x, canvas.width)), 
                     y: Math.max(0, Math.min(y, canvas.height)) };
        }
        
        function start(e) {
            drawing = true;
            const pos = getCoordinates(e);
            ctx.beginPath();
            ctx.moveTo(pos.x, pos.y);
            ctx.lineTo(pos.x, pos.y);
            ctx.stroke();
            e.preventDefault();
        }
        
        function draw(e) {
            if (!drawing) return;
            e.preventDefault();
            const pos = getCoordinates(e);
            ctx.lineTo(pos.x, pos.y);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(pos.x, pos.y);
        }
        
        function stop(e) {
            drawing = false;
            ctx.beginPath();
            e.preventDefault();
        }
        
        function clearCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.beginPath();
            showStatus('Очищено', 'success');
        }
        
        function showStatus(msg, type) {
            const div = document.getElementById('status');
            div.textContent = msg;
            div.className = `status ${type}`;
            setTimeout(() => { div.textContent = ''; div.className = 'status'; }, 2000);
        }
        
        function isCanvasEmpty() {
            const pixels = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
            for (let i = 3; i < pixels.length; i += 4) {
                if (pixels[i] > 0) return false;
            }
            return true;
        }
        
        function saveSignature() {
            if (isCanvasEmpty()) {
                showStatus('Нарисуйте подпись!', 'error');
                return;
            }
            
            const imageData = canvas.toDataURL('image/png');
            showStatus('Отправка...', 'success');
            
            try {
                Telegram.WebApp.sendData(imageData);
                showStatus('Отправлено!', 'success');
                setTimeout(() => Telegram.WebApp.close(), 500);
            } catch(e) {
                showStatus('Ошибка: ' + e.message, 'error');
            }
        }
        
        canvas.addEventListener('mousedown', start);
        canvas.addEventListener('mousemove', draw);
        canvas.addEventListener('mouseup', stop);
        canvas.addEventListener('mouseleave', stop);
        canvas.addEventListener('touchstart', start);
        canvas.addEventListener('touchmove', draw);
        canvas.addEventListener('touchend', stop);
        
        Telegram.WebApp.ready();
        Telegram.WebApp.expand();
    </script>
</body>
</html>
