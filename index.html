<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Электронная подпись</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--tg-theme-bg-color);
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            padding: 20px;
            min-height: 100vh;
        }
        .container { max-width: 500px; margin: 0 auto; }
        h3 { text-align: center; margin-bottom: 20px; color: var(--tg-theme-text-color); }
        .canvas-wrapper {
            background: white;
            border-radius: 16px;
            padding: 10px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        canvas {
            display: block;
            width: 100%;
            height: auto;
            background: white;
            border-radius: 8px;
            cursor: crosshair;
            border: 1px solid #ccc;
        }
        .buttons { display: flex; gap: 12px; margin-bottom: 20px; }
        button {
            flex: 1;
            background: var(--tg-theme-button-color);
            color: var(--tg-theme-button-text-color);
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
        }
        .clear-btn {
            background: var(--tg-theme-secondary-bg-color);
            color: var(--tg-theme-text-color);
        }
        .save-btn {
            background: #34B7F1;
            color: white;
        }
        .info {
            text-align: center;
            color: var(--tg-theme-hint-color);
            font-size: 13px;
            margin-top: 20px;
        }
        .status {
            text-align: center;
            font-size: 14px;
            padding: 10px;
            margin-top: 10px;
            border-radius: 8px;
        }
        .success { background: rgba(0,200,0,0.2); color: #00cc00; }
        .error { background: rgba(200,0,0,0.2); color: #ff4444; }
        .preview-image {
            display: none;
            max-width: 100%;
            margin-top: 20px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .instruction {
            display: none;
            background: rgba(0,100,200,0.2);
            color: #0088ff;
            padding: 12px;
            border-radius: 12px;
            margin-top: 15px;
            text-align: center;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h3>✍️ Электронная подпись</h3>
        
        <div class="canvas-wrapper">
            <canvas id="signatureCanvas" width="500" height="200"></canvas>
        </div>
        
        <div class="buttons">
            <button class="clear-btn" onclick="clearCanvas()">🗑 Очистить</button>
            <button class="save-btn" onclick="saveToPhone()">💾 Сохранить на телефон</button>
        </div>
        
        <div class="info">
            ✍️ Нарисуйте подпись → "Сохранить на телефон"
        </div>
        
        <div id="status" class="status"></div>
        <img id="previewImage" class="preview-image" />
        <div id="instruction" class="instruction"></div>
    </div>

    <script>
        const canvas = document.getElementById('signatureCanvas');
        const ctx = canvas.getContext('2d');
        let drawing = false;
        
        // Белый фон
        ctx.fillStyle = 'white';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        // Настройки рисования
        ctx.lineWidth = 2.5;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.strokeStyle = '#000000';
        
        function getCoordinates(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            
            let clientX, clientY;
            if (e.touches) {
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
                e.preventDefault();
            } else {
                clientX = e.clientX;
                clientY = e.clientY;
            }
            
            let x = (clientX - rect.left) * scaleX;
            let y = (clientY - rect.top) * scaleY;
            x = Math.max(0, Math.min(x, canvas.width));
            y = Math.max(0, Math.min(y, canvas.height));
            return { x, y };
        }
        
        function startDrawing(e) {
            drawing = true;
            const pos = getCoordinates(e);
            ctx.beginPath();
            ctx.moveTo(pos.x, pos.y);
            ctx.lineTo(pos.x, pos.y);
            ctx.stroke();
            e.preventDefault();
        }
        
        function draw(e) {
            if (!drawing) return;
            e.preventDefault();
            const pos = getCoordinates(e);
            ctx.lineTo(pos.x, pos.y);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(pos.x, pos.y);
        }
        
        function stopDrawing(e) {
            drawing = false;
            ctx.beginPath();
            if (e) e.preventDefault();
        }
        
        function clearCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = 'white';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.beginPath();
            
            // Скрываем превью и инструкцию
            document.getElementById('previewImage').style.display = 'none';
            document.getElementById('instruction').style.display = 'none';
            showStatus('Очищено', 'success');
        }
        
        function showStatus(msg, type) {
            const div = document.getElementById('status');
            div.textContent = msg;
            div.className = `status ${type}`;
            setTimeout(() => {
                if (div.textContent === msg) div.textContent = '';
            }, 2000);
        }
        
        function isCanvasEmpty() {
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const pixels = imageData.data;
            for (let i = 0; i < pixels.length; i += 4) {
                if (pixels[i] < 250 || pixels[i+1] < 250 || pixels[i+2] < 250) {
                    return false;
                }
            }
            return true;
        }
        
        function saveToPhone() {
            if (isCanvasEmpty()) {
                showStatus('⚠️ Нарисуйте подпись!', 'error');
                return;
            }
            
            showStatus('📸 Создание изображения...', 'success');
            
            // Уменьшаем размер
            const tempCanvas = document.createElement('canvas');
            const tempCtx = tempCanvas.getContext('2d');
            tempCanvas.width = 400;
            tempCanvas.height = 160;
            tempCtx.fillStyle = 'white';
            tempCtx.fillRect(0, 0, tempCanvas.width, tempCanvas.height);
            tempCtx.drawImage(canvas, 0, 0, tempCanvas.width, tempCanvas.height);
            
            // Показываем изображение на экране
            const imageUrl = tempCanvas.toDataURL('image/jpeg', 0.9);
            const previewImg = document.getElementById('previewImage');
            previewImg.src = imageUrl;
            previewImg.style.display = 'block';
            
            // Показываем инструкцию
            const instructionDiv = document.getElementById('instruction');
            instructionDiv.innerHTML = '📱 **Как сохранить подпись:**<br><br>' +
                '1️⃣ Нажмите и удерживайте на изображении выше<br>' +
                '2️⃣ Выберите **"Сохранить изображение"**<br>' +
                '3️⃣ Затем отправьте сохранённый файл боту в чат<br><br>' +
                '✅ После отправки подпись автоматически добавится в Excel';
            instructionDiv.style.display = 'block';
            
            showStatus('✅ Изображение готово! Нажмите и удерживайте для сохранения', 'success');
            
            // Пытаемся скачать (для компьютера)
            try {
                const link = document.createElement('a');
                link.download = 'signature.jpg';
                link.href = imageUrl;
                link.click();
            } catch(e) {
                console.log('Автоскачивание не поддерживается');
            }
            
            // Не закрываем MiniApp, чтобы пользователь мог сохранить изображение
            // setTimeout(() => Telegram.WebApp.close(), 5000);
        }
        
        canvas.addEventListener('mousedown', startDrawing);
        canvas.addEventListener('mousemove', draw);
        canvas.addEventListener('mouseup', stopDrawing);
        canvas.addEventListener('mouseleave', stopDrawing);
        canvas.addEventListener('touchstart', startDrawing);
        canvas.addEventListener('touchmove', draw);
        canvas.addEventListener('touchend', stopDrawing);
        
        Telegram.WebApp.ready();
        Telegram.WebApp.expand();
    </script>
</body>
</html>
