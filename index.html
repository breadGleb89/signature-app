<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Электронная подпись</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            padding: 20px;
            text-align: center;
            background: var(--tg-theme-bg-color);
            color: var(--tg-theme-text-color);
        }
        canvas {
            border: 2px solid var(--tg-theme-button-color);
            border-radius: 12px;
            cursor: crosshair;
            background: white;
            margin: 20px 0;
            touch-action: none;
        }
        button {
            margin: 5px;
            padding: 12px 24px;
            border-radius: 12px;
            border: none;
            background: var(--tg-theme-button-color);
            color: var(--tg-theme-button-text-color);
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
        }
        .clear {
            background: var(--tg-theme-secondary-bg-color);
            color: var(--tg-theme-text-color);
        }
        .status {
            margin-top: 20px;
            font-size: 14px;
            color: var(--tg-theme-hint-color);
        }
        .success { color: #00cc00; }
        .error { color: #ff4444; }
        .info { color: #0088ff; }
    </style>
</head>
<body>
    <h3>✍️ Электронная подпись</h3>
    <canvas id="sigCanvas" width="350" height="150"></canvas><br>
    <button class="clear" onclick="clearCanvas()">Очистить</button>
    <button onclick="sendSignature()">Сохранить подпись</button>
    <div id="status" class="status"></div>

    <script>
        const canvas = document.getElementById('sigCanvas');
        const ctx = canvas.getContext('2d');
        let drawing = false;
        
        // Белый фон для рисования
        ctx.fillStyle = 'white';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.strokeStyle = 'black';
        ctx.lineWidth = 2.5;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        
        function getCoords(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            let x, y;
            if (e.touches) {
                x = (e.touches[0].clientX - rect.left) * scaleX;
                y = (e.touches[0].clientY - rect.top) * scaleY;
                e.preventDefault();
            } else {
                x = (e.clientX - rect.left) * scaleX;
                y = (e.clientY - rect.top) * scaleY;
            }
            return { x: Math.min(Math.max(0, x), canvas.width), y: Math.min(Math.max(0, y), canvas.height) };
        }
        
        function start(e) { 
            drawing = true; 
            const p = getCoords(e); 
            ctx.beginPath(); 
            ctx.moveTo(p.x, p.y); 
            ctx.lineTo(p.x, p.y); 
            ctx.stroke(); 
            e.preventDefault(); 
        }
        
        function draw(e) { 
            if (!drawing) return; 
            e.preventDefault(); 
            const p = getCoords(e); 
            ctx.lineTo(p.x, p.y); 
            ctx.stroke(); 
            ctx.beginPath(); 
            ctx.moveTo(p.x, p.y); 
        }
        
        function stop(e) { 
            drawing = false; 
            ctx.beginPath(); 
            e.preventDefault(); 
        }
        
        function clearCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = 'white';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            showStatus('Очищено', 'success');
        }
        
        function showStatus(msg, type) {
            const div = document.getElementById('status');
            div.textContent = msg;
            div.className = `status ${type}`;
            setTimeout(() => {
                if (div.textContent === msg) div.textContent = '';
            }, 2000);
        }
        
        function isCanvasEmpty() {
            const pixels = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
            for (let i = 3; i < pixels.length; i += 4) {
                if (pixels[i] > 0) return false;
            }
            return true;
        }
        
        function cropToSignature(img) {
            const analysisCanvas = document.createElement('canvas');
            const analysisCtx = analysisCanvas.getContext('2d');
            analysisCanvas.width = img.width;
            analysisCanvas.height = img.height;
            analysisCtx.drawImage(img, 0, 0);
            
            const pixels = analysisCtx.getImageData(0, 0, img.width, img.height);
            const data = pixels.data;
            
            let minX = img.width, minY = img.height, maxX = 0, maxY = 0;
            let hasPixels = false;
            
            for (let y = 0; y < img.height; y++) {
                for (let x = 0; x < img.width; x++) {
                    const idx = (y * img.width + x) * 4;
                    if (data[idx] < 250 || data[idx+1] < 250 || data[idx+2] < 250) {
                        hasPixels = true;
                        if (x < minX) minX = x;
                        if (x > maxX) maxX = x;
                        if (y < minY) minY = y;
                        if (y > maxY) maxY = y;
                    }
                }
            }
            
            if (!hasPixels) return null;
            
            const padding = 5;
            minX = Math.max(0, minX - padding);
            minY = Math.max(0, minY - padding);
            maxX = Math.min(img.width, maxX + padding);
            maxY = Math.min(img.height, maxY + padding);
            
            const croppedCanvas = document.createElement('canvas');
            const croppedCtx = croppedCanvas.getContext('2d');
            croppedCanvas.width = maxX - minX;
            croppedCanvas.height = maxY - minY;
            croppedCtx.fillStyle = 'white';
            croppedCtx.fillRect(0, 0, croppedCanvas.width, croppedCanvas.height);
            croppedCtx.drawImage(img, minX, minY, croppedCanvas.width, croppedCanvas.height, 0, 0, croppedCanvas.width, croppedCanvas.height);
            
            return croppedCanvas;
        }
        
        async function sendSignature() {
            if (isCanvasEmpty()) {
                showStatus('Нарисуйте подпись!', 'error');
                return;
            }
            
            showStatus('Обработка...', 'info');
            
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = canvas.width;
            tempCanvas.height = canvas.height;
            const tempCtx = tempCanvas.getContext('2d');
            tempCtx.fillStyle = 'white';
            tempCtx.fillRect(0, 0, tempCanvas.width, tempCanvas.height);
            tempCtx.drawImage(canvas, 0, 0);
            
            let finalCanvas = cropToSignature(tempCanvas);
            if (!finalCanvas) {
                showStatus('Ошибка обработки', 'error');
                return;
            }
            
            // РАЗМЕР ПОДПИСИ: 1.6 см × 0.8 см
            // При 96 DPI: 1.6 см = 60 пикселей, 0.8 см = 30 пикселей
            // Но для лучшего качества используем 120x60 (2x размер)
            const targetWidth = 120;   // 1.6 см × 75 DPI ≈ 47px, берем 60px * 2 = 120px
            const targetHeight = 60;   // 0.8 см × 75 DPI ≈ 24px, берем 30px * 2 = 60px
            
            const resizedCanvas = document.createElement('canvas');
            resizedCanvas.width = targetWidth;
            resizedCanvas.height = targetHeight;
            const resizedCtx = resizedCanvas.getContext('2d');
            resizedCtx.fillStyle = 'white';
            resizedCtx.fillRect(0, 0, targetWidth, targetHeight);
            resizedCtx.drawImage(finalCanvas, 0, 0, targetWidth, targetHeight);
            
            // JPEG с качеством 0.5 (хорошее сжатие)
            const imageData = resizedCanvas.toDataURL('image/jpeg', 0.5);
            const sizeKB = Math.round(imageData.length / 1024);
            
            showStatus(`Размер: ${sizeKB} KB`, 'info');
            console.log(`Подпись: ${targetWidth}x${targetHeight}px, ${imageData.length} байт`);
            
            Telegram.WebApp.sendData(imageData);
            
            setTimeout(() => {
                Telegram.WebApp.close();
            }, 500);
        }
        
        canvas.addEventListener('mousedown', start);
        canvas.addEventListener('mousemove', draw);
        canvas.addEventListener('mouseup', stop);
        canvas.addEventListener('mouseleave', stop);
        canvas.addEventListener('touchstart', start);
        canvas.addEventListener('touchmove', draw);
        canvas.addEventListener('touchend', stop);
        
        Telegram.WebApp.ready();
        Telegram.WebApp.expand();
    </script>
</body>
</html>
