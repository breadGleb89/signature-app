<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Signature</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            padding: 20px;
            text-align: center;
            background: var(--tg-theme-bg-color);
            color: var(--tg-theme-text-color);
        }
        canvas {
            border: 2px solid var(--tg-theme-button-color);
            border-radius: 12px;
            cursor: crosshair;
            background: white;
            margin: 20px 0;
            touch-action: none;
        }
        button {
            margin: 5px;
            padding: 12px 24px;
            border-radius: 12px;
            border: none;
            background: var(--tg-theme-button-color);
            color: var(--tg-theme-button-text-color);
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
        }
        .clear {
            background: var(--tg-theme-secondary-bg-color);
            color: var(--tg-theme-text-color);
        }
        .status {
            margin-top: 20px;
            font-size: 14px;
            color: var(--tg-theme-hint-color);
        }
        .success { color: #00cc00; }
        .error { color: #ff4444; }
    </style>
</head>
<body>
    <h3>✍️ Electronic Signature</h3>
    <canvas id="sigCanvas" width="350" height="150"></canvas><br>
    <button class="clear" onclick="clearCanvas()">Clear</button>
    <button onclick="sendToServer()">Save Signature</button>
    <div id="status" class="status"></div>

    <script>
        // SERVER URL - замените на ваш Render URL
        const SERVER_URL = "https://signature-server-87mz.onrender.com/save_signature";
        
        const canvas = document.getElementById('sigCanvas');
        const ctx = canvas.getContext('2d');
        let drawing = false;
        
        // Initialize canvas
        function initCanvas() {
            ctx.fillStyle = 'white';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = 'black';
            ctx.lineWidth = 2;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
        }
        
        initCanvas();
        
        function getCoords(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            let x, y;
            if (e.touches) {
                x = (e.touches[0].clientX - rect.left) * scaleX;
                y = (e.touches[0].clientY - rect.top) * scaleY;
                e.preventDefault();
            } else {
                x = (e.clientX - rect.left) * scaleX;
                y = (e.clientY - rect.top) * scaleY;
            }
            return { 
                x: Math.min(Math.max(0, x), canvas.width), 
                y: Math.min(Math.max(0, y), canvas.height) 
            };
        }
        
        function start(e) { 
            drawing = true; 
            const p = getCoords(e);
            ctx.beginPath();
            ctx.moveTo(p.x, p.y);
            ctx.lineTo(p.x, p.y);
            ctx.stroke();
            e.preventDefault();
        }
        
        function draw(e) { 
            if (!drawing) return; 
            e.preventDefault(); 
            const p = getCoords(e);
            ctx.lineTo(p.x, p.y);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(p.x, p.y);
        }
        
        function stop(e) { 
            drawing = false; 
            ctx.beginPath();
            e.preventDefault(); 
        }
        
        function clearCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = 'white';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            showStatus('Canvas cleared', 'info');
        }
        
        function showStatus(msg, type) {
            const div = document.getElementById('status');
            div.textContent = msg;
            div.className = `status ${type}`;
            setTimeout(() => {
                if (div.textContent === msg) div.textContent = '';
            }, 3000);
        }
        
        function isCanvasEmpty() {
            const pixels = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
            for (let i = 3; i < pixels.length; i += 4) {
                if (pixels[i] > 0) return false;
            }
            return true;
        }
        
        async function sendToServer() {
            if (isCanvasEmpty()) {
                showStatus('Draw a signature first!', 'error');
                return;
            }
            
            showStatus('Sending to server...', 'info');
            
            // Create a fresh canvas with the current signature
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = 300;
            tempCanvas.height = 120;
            const tempCtx = tempCanvas.getContext('2d');
            tempCtx.fillStyle = 'white';
            tempCtx.fillRect(0, 0, tempCanvas.width, tempCanvas.height);
            tempCtx.drawImage(canvas, 0, 0, tempCanvas.width, tempCanvas.height);
            
            const imageData = tempCanvas.toDataURL('image/jpeg', 0.8);
            const userId = Telegram.WebApp.initDataUnsafe.user?.id || 0;
            
            console.log('Sending to server:', SERVER_URL);
            console.log('User ID:', userId);
            console.log('Image size:', imageData.length);
            
            try {
                const response = await fetch(SERVER_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        user_id: userId,
                        signature: imageData
                    })
                });
                
                const result = await response.json();
                console.log('Server response:', result);
                
                if (response.ok) {
                    showStatus('Signature saved!', 'success');
                    
                    // Send URL to bot via sendData
                    if (result.url) {
                        Telegram.WebApp.sendData(result.url);
                    }
                    
                    setTimeout(() => {
                        Telegram.WebApp.close();
                    }, 1000);
                } else {
                    showStatus('Error: ' + (result.error || 'Unknown'), 'error');
                }
            } catch (error) {
                console.error('Fetch error:', error);
                showStatus('Connection error: ' + error.message, 'error');
            }
        }
        
        canvas.addEventListener('mousedown', start);
        canvas.addEventListener('mousemove', draw);
        canvas.addEventListener('mouseup', stop);
        canvas.addEventListener('mouseleave', stop);
        canvas.addEventListener('touchstart', start);
        canvas.addEventListener('touchmove', draw);
        canvas.addEventListener('touchend', stop);
        
        Telegram.WebApp.ready();
        Telegram.WebApp.expand();
        console.log('WebApp ready');
    </script>
</body>
</html>
