<!DOCTYPE html>
<html>
<head>
  <title>Подпись</title>
  <style>
    body { font-family: Arial, sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
    canvas { border: 2px solid #333; background-color: #fff; cursor: crosshair; }
    button { margin-top: 15px; padding: 10px 20px; font-size: 16px; }
  </style>
</head>
<body>
  <h2>Нарисуйте вашу подпись:</h2>
  <canvas id="signature" width="400" height="200"></canvas>
  <br>
  <button onclick="saveSignature()">Сохранить подпись</button>

  <script>
    const canvas = document.getElementById('signature');
    const ctx = canvas.getContext('2d');
    
    let isDrawing = false;
    
    // Настройки рисования
    ctx.lineWidth = 3;
    ctx.lineCap = 'round';
    ctx.strokeStyle = '#000';
    
    canvas.addEventListener('mousedown', startDrawing);
    canvas.addEventListener('mousemove', draw);
    canvas.addEventListener('mouseup', stopDrawing);
    canvas.addEventListener('mouseout', stopDrawing);
    
    function startDrawing(e) {
      isDrawing = true;
      ctx.beginPath();
      ctx.moveTo(e.offsetX, e.offsetY);
    }
    
    function draw(e) {
      if (!isDrawing) return;
      ctx.lineTo(e.offsetX, e.offsetY);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(e.offsetX, e.offsetY);
    }
    
    function stopDrawing() {
      isDrawing = false;
      ctx.beginPath();
    }
    
    function saveSignature() {
      // Получаем изображение в формате PNG (base64)
      const dataURL = canvas.toDataURL('image/png');
      
      // Отправляем данные в Telegram Web App
      window.Telegram.WebApp.sendData(dataURL);
      
      // Закрываем мини-приложение после отправки (опционально)
      window.Telegram.WebApp.close();
      
      alert('Подпись отправлена!');
    }
  </script>
</body>
</html>
