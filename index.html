<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Подпись</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: system-ui; padding: 20px; text-align: center; }
        canvas { border: 1px solid #ccc; cursor: crosshair; background: white; margin: 20px 0; }
        button { margin: 5px; padding: 12px 24px; border-radius: 12px; border: none; background: #0088cc; color: white; }
        .clear { background: #999; }
        .status { margin-top: 20px; color: #666; }
    </style>
</head>
<body>
    <h3>✍️ Электронная подпись</h3>
    <canvas id="sigCanvas" width="300" height="120"></canvas><br>
    <button class="clear" onclick="clearCanvas()">Очистить</button>
    <button onclick="sendSignature()">✅ Отправить подпись</button>
    <div id="status" class="status"></div>

    <script>
        const canvas = document.getElementById('sigCanvas');
        const ctx = canvas.getContext('2d');
        let drawing = false;

        ctx.fillStyle = 'white';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.strokeStyle = 'black';
        ctx.lineWidth = 2;

        function getCoords(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            let x, y;
            if (e.touches) {
                x = (e.touches[0].clientX - rect.left) * scaleX;
                y = (e.touches[0].clientY - rect.top) * scaleY;
                e.preventDefault();
            } else {
                x = (e.clientX - rect.left) * scaleX;
                y = (e.clientY - rect.top) * scaleY;
            }
            return { x: Math.min(Math.max(0, x), canvas.width), y: Math.min(Math.max(0, y), canvas.height) };
        }

        function start(e) { drawing = true; ctx.beginPath(); const p = getCoords(e); ctx.moveTo(p.x, p.y); ctx.lineTo(p.x, p.y); ctx.stroke(); e.preventDefault(); }
        function draw(e) { if (!drawing) return; e.preventDefault(); const p = getCoords(e); ctx.lineTo(p.x, p.y); ctx.stroke(); ctx.beginPath(); ctx.moveTo(p.x, p.y); }
        function stop(e) { drawing = false; ctx.beginPath(); e.preventDefault(); }

        function clearCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = 'white';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            document.getElementById('status').innerText = 'Очищено';
        }

        function isCanvasEmpty() {
            const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < imgData.data.length; i += 4) {
                if (imgData.data[i] < 250) return false;
            }
            return true;
        }

        async function sendSignature() {
            if (isCanvasEmpty()) {
                document.getElementById('status').innerText = '⚠️ Сначала нарисуйте подпись';
                return;
            }
            document.getElementById('status').innerText = '📤 Загрузка...';

            // Уменьшаем размер
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = 300;
            tempCanvas.height = 120;
            const tempCtx = tempCanvas.getContext('2d');
            tempCtx.fillStyle = 'white';
            tempCtx.fillRect(0, 0, tempCanvas.width, tempCanvas.height);
            tempCtx.drawImage(canvas, 0, 0, tempCanvas.width, tempCanvas.height);

            // Получаем Blob
            const blob = await new Promise(resolve => tempCanvas.toBlob(resolve, 'image/jpeg', 0.8));
            
            // Загружаем на Telegraph
            const formData = new FormData();
            formData.append('file', blob, 'signature.jpg');
            
            try {
                const uploadRes = await fetch('https://telegra.ph/upload', {
                    method: 'POST',
                    body: formData
                });
                const uploadData = await uploadRes.json();
                if (uploadData && uploadData[0] && uploadData[0].src) {
                    const imageUrl = 'https://telegra.ph' + uploadData[0].src;
                    // Отправляем ссылку боту через sendData
                    Telegram.WebApp.sendData(imageUrl);
                    document.getElementById('status').innerText = '✅ Отправлено!';
                    setTimeout(() => Telegram.WebApp.close(), 500);
                } else {
                    document.getElementById('status').innerText = '❌ Ошибка загрузки';
                }
            } catch (err) {
                console.error(err);
                document.getElementById('status').innerText = '❌ Ошибка соединения';
            }
        }

        canvas.addEventListener('mousedown', start);
        canvas.addEventListener('mousemove', draw);
        canvas.addEventListener('mouseup', stop);
        canvas.addEventListener('mouseleave', stop);
        canvas.addEventListener('touchstart', start);
        canvas.addEventListener('touchmove', draw);
        canvas.addEventListener('touchend', stop);

        Telegram.WebApp.ready();
        Telegram.WebApp.expand();
    </script>
</body>
</html>
