<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Signature</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            padding: 20px;
            text-align: center;
            background: var(--tg-theme-bg-color);
            color: var(--tg-theme-text-color);
        }
        canvas {
            border: 2px solid var(--tg-theme-button-color);
            border-radius: 12px;
            cursor: crosshair;
            background: white;
            margin: 20px 0;
            touch-action: none;
        }
        button {
            margin: 5px;
            padding: 12px 24px;
            border-radius: 12px;
            border: none;
            background: var(--tg-theme-button-color);
            color: var(--tg-theme-button-text-color);
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
        }
        .clear {
            background: var(--tg-theme-secondary-bg-color);
            color: var(--tg-theme-text-color);
        }
        .status {
            margin-top: 20px;
            font-size: 14px;
            color: var(--tg-theme-hint-color);
        }
        .success { color: #00cc00; }
        .error { color: #ff4444; }
    </style>
</head>
<body>
    <h3>✍️ Electronic Signature</h3>
    <canvas id="sigCanvas" width="400" height="200"></canvas><br>
    <button class="clear" onclick="clearCanvas()">Clear</button>
    <button onclick="sendToServer()">Save Signature</button>
    <div id="status" class="status"></div>

    <script>
        const SERVER_URL = "https://signature-server-87mz.onrender.com/save_signature";
        
        const canvas = document.getElementById('sigCanvas');
        const ctx = canvas.getContext('2d');
        let drawing = false;
        
        // Initialize canvas with white background for drawing
        function initCanvas() {
            ctx.fillStyle = 'white';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = 'black';
            ctx.lineWidth = 2.5;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
        }
        
        initCanvas();
        
        function getCoords(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            let x, y;
            if (e.touches) {
                x = (e.touches[0].clientX - rect.left) * scaleX;
                y = (e.touches[0].clientY - rect.top) * scaleY;
                e.preventDefault();
            } else {
                x = (e.clientX - rect.left) * scaleX;
                y = (e.clientY - rect.top) * scaleY;
            }
            return { 
                x: Math.min(Math.max(0, x), canvas.width), 
                y: Math.min(Math.max(0, y), canvas.height) 
            };
        }
        
        function start(e) { 
            drawing = true; 
            const p = getCoords(e);
            ctx.beginPath();
            ctx.moveTo(p.x, p.y);
            ctx.lineTo(p.x, p.y);
            ctx.stroke();
            e.preventDefault();
        }
        
        function draw(e) { 
            if (!drawing) return; 
            e.preventDefault(); 
            const p = getCoords(e);
            ctx.lineTo(p.x, p.y);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(p.x, p.y);
        }
        
        function stop(e) { 
            drawing = false; 
            ctx.beginPath();
            e.preventDefault(); 
        }
        
        function clearCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = 'white';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            showStatus('Cleared', 'info');
        }
        
        function showStatus(msg, type) {
            const div = document.getElementById('status');
            div.textContent = msg;
            div.className = `status ${type}`;
            setTimeout(() => {
                if (div.textContent === msg) div.textContent = '';
            }, 2000);
        }
        
        function isCanvasEmpty() {
            const pixels = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
            for (let i = 3; i < pixels.length; i += 4) {
                if (pixels[i] > 0) return false;
            }
            return true;
        }
        
        // Функция для обрезки изображения до границ подписи
        function cropToSignature(imageData) {
            return new Promise((resolve) => {
                const img = new Image();
                img.onload = () => {
                    // Создаем временный canvas для анализа
                    const analysisCanvas = document.createElement('canvas');
                    const analysisCtx = analysisCanvas.getContext('2d');
                    analysisCanvas.width = img.width;
                    analysisCanvas.height = img.height;
                    analysisCtx.drawImage(img, 0, 0);
                    
                    // Получаем пиксели
                    const pixels = analysisCtx.getImageData(0, 0, img.width, img.height);
                    const data = pixels.data;
                    
                    // Находим границы подписи (где есть черные пиксели)
                    let minX = img.width, minY = img.height, maxX = 0, maxY = 0;
                    let hasPixels = false;
                    
                    for (let y = 0; y < img.height; y++) {
                        for (let x = 0; x < img.width; x++) {
                            const idx = (y * img.width + x) * 4;
                            // Проверяем, не белый ли пиксель (R,G,B не все 255)
                            if (data[idx] < 250 || data[idx+1] < 250 || data[idx+2] < 250) {
                                hasPixels = true;
                                if (x < minX) minX = x;
                                if (x > maxX) maxX = x;
                                if (y < minY) minY = y;
                                if (y > maxY) maxY = y;
                            }
                        }
                    }
                    
                    if (!hasPixels) {
                        resolve(null);
                        return;
                    }
                    
                    // Добавляем небольшие отступы
                    const padding = 10;
                    minX = Math.max(0, minX - padding);
                    minY = Math.max(0, minY - padding);
                    maxX = Math.min(img.width, maxX + padding);
                    maxY = Math.min(img.height, maxY + padding);
                    
                    // Создаем обрезанный canvas с прозрачным фоном
                    const croppedCanvas = document.createElement('canvas');
                    const croppedCtx = croppedCanvas.getContext('2d');
                    croppedCanvas.width = maxX - minX;
                    croppedCanvas.height = maxY - minY;
                    
                    // Рисуем только подпись без фона
                    croppedCtx.drawImage(img, minX, minY, croppedCanvas.width, croppedCanvas.height, 0, 0, croppedCanvas.width, croppedCanvas.height);
                    
                    resolve(croppedCanvas);
                };
                img.src = imageData;
            });
        }
        
        async function sendToServer() {
            if (isCanvasEmpty()) {
                showStatus('Draw signature first!', 'error');
                return;
            }
            
            showStatus('Processing...', 'info');
            
            // Создаем canvas с подписью
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = canvas.width;
            tempCanvas.height = canvas.height;
            const tempCtx = tempCanvas.getContext('2d');
            tempCtx.fillStyle = 'white';
            tempCtx.fillRect(0, 0, tempCanvas.width, tempCanvas.height);
            tempCtx.drawImage(canvas, 0, 0);
            
            // Получаем изображение и обрезаем
            const imageData = tempCanvas.toDataURL('image/png');
            const croppedCanvas = await cropToSignature(imageData);
            
            if (!croppedCanvas) {
                showStatus('No signature found', 'error');
                return;
            }
            
            // Дополнительно уменьшаем размер
            const finalCanvas = document.createElement('canvas');
            let finalWidth = croppedCanvas.width;
            let finalHeight = croppedCanvas.height;
            
            // Если слишком большое - уменьшаем
            if (finalWidth > 300) {
                const scale = 300 / finalWidth;
                finalWidth = 300;
                finalHeight = Math.floor(finalHeight * scale);
            }
            
            finalCanvas.width = finalWidth;
            finalCanvas.height = finalHeight;
            const finalCtx = finalCanvas.getContext('2d');
            finalCtx.drawImage(croppedCanvas, 0, 0, finalWidth, finalHeight);
            
            // Конвертируем в PNG (прозрачный фон)
            const finalImageData = finalCanvas.toDataURL('image/png');
            const userId = Telegram.WebApp.initDataUnsafe.user?.id || 0;
            
            console.log('Original size:', imageData.length);
            console.log('Cropped size:', finalImageData.length);
            showStatus(`Sending (${Math.round(finalImageData.length / 1024)}KB)...`, 'info');
            
            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 15000);
                
                const response = await fetch(SERVER_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_id: userId, signature: finalImageData }),
                    signal: controller.signal
                });
                
                clearTimeout(timeoutId);
                const result = await response.json();
                
                if (response.ok && result.url) {
                    showStatus('Saved!', 'success');
                    Telegram.WebApp.sendData(result.url);
                    setTimeout(() => Telegram.WebApp.close(), 500);
                } else {
                    showStatus('Error: ' + (result.error || 'Unknown'), 'error');
                }
            } catch (error) {
                console.error('Error:', error);
                if (error.name === 'AbortError') {
                    showStatus('Timeout - try again', 'error');
                } else {
                    showStatus('Connection error', 'error');
                }
            }
        }
        
        canvas.addEventListener('mousedown', start);
        canvas.addEventListener('mousemove', draw);
        canvas.addEventListener('mouseup', stop);
        canvas.addEventListener('mouseleave', stop);
        canvas.addEventListener('touchstart', start);
        canvas.addEventListener('touchmove', draw);
        canvas.addEventListener('touchend', stop);
        
        Telegram.WebApp.ready();
        Telegram.WebApp.expand();
        console.log('WebApp ready');
    </script>
</body>
</html>
