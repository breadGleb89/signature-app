<!DOCTYPE html>
<html>
<head>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <h1>Заказ-поручение</h1>
    <input type="text" id="name" placeholder="Ваше имя">
    <input type="text" id="phone" placeholder="Телефон">
    <button onclick="send()">Отправить</button>
    
    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        
        async function send() {
            const name = document.getElementById('name').value;
            const phone = document.getElementById('phone').value;
            const userId = tg.initDataUnsafe?.user?.id || 0;
            
            // Отправляем данные на сервер
            const response = await fetch('https://signature-server-87mz.onrender.com/save_form_data', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    user_id: userId,
                    form_data: {name: name, phone: phone}
                })
            });
            
            const result = await response.json();
            
            // Отправляем ID в бота
            tg.sendData(JSON.stringify({session_id: result.session_id}));
            tg.close();
        }
    </script>
</body>
</html>
