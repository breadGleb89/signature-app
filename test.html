<!DOCTYPE html>
<html>
<head>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <h1>Тест WebApp</h1>
    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        
        // Используем Главную кнопку Telegram
        tg.MainButton.setText("✅ Отправить");
        tg.MainButton.show();
        tg.MainButton.onClick(() => {
            console.log("Кнопка нажата");
            tg.sendData("Тестовое сообщение");
            tg.close();
        });
    </script>
</body>
</html>
